<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="The same house years earlier, derelict and storm-damaged in heavy rain">
  <defs>
    <linearGradient id="skyO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3C434A"/><stop offset="0.6" stop-color="#5A636B"/><stop offset="1" stop-color="#7A828A"/>
    </linearGradient>
    <linearGradient id="lawnO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7C7853"/><stop offset="1" stop-color="#5E5B3E"/>
    </linearGradient>
    <linearGradient id="lakeO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5C666E"/><stop offset="1" stop-color="#454D54"/>
    </linearGradient>
    <linearGradient id="wallO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9E9A8C"/><stop offset="1" stop-color="#827E70"/>
    </linearGradient>
    <linearGradient id="roofO" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3A3A38"/><stop offset="1" stop-color="#222220"/>
    </linearGradient>
  </defs>

  <!-- stormy sky -->
  <rect width="1600" height="640" fill="url(#skyO)"/>
  <g fill="#2E343A" opacity="0.8">
    <ellipse cx="320" cy="120" rx="180" ry="48"/><ellipse cx="520" cy="150" rx="150" ry="40"/>
    <ellipse cx="1000" cy="100" rx="200" ry="50"/><ellipse cx="1280" cy="150" rx="160" ry="44"/>
  </g>
  <!-- dead treeline -->
  <g fill="#4B4F45">
    <polygon points="0,560 70,450 140,560"/><polygon points="110,560 190,440 270,560"/>
    <polygon points="240,560 320,460 400,560"/><polygon points="1180,560 1260,450 1340,560"/>
    <polygon points="1310,560 1390,445 1470,560"/><polygon points="1440,560 1520,460 1600,560"/>
  </g>
  <!-- grey lake -->
  <path d="M0 600 Q 400 560 820 600 L 1600 600 L 1600 660 L 0 660 Z" fill="url(#lakeO)"/>
  <!-- muddy lawn with bare patches -->
  <rect y="630" width="1600" height="270" fill="url(#lawnO)"/>
  <g fill="#6A6648" opacity="0.7"><ellipse cx="240" cy="720" rx="120" ry="34"/><ellipse cx="520" cy="780" rx="90" ry="26"/><ellipse cx="1380" cy="760" rx="110" ry="30"/></g>
  <g stroke="#4F4C33" stroke-width="2" opacity="0.7"><path d="M180 700 l 8 -26"/><path d="M210 706 l -6 -24"/><path d="M300 712 l 6 -22"/></g>

  <!-- cracked driveway -->
  <polygon points="1120,660 1300,660 1360,900 1060,900" fill="#8A8C86"/>
  <g stroke="#5C5E58" stroke-width="3" fill="none">
    <path d="M1180 664 l -10 60 l 18 70 l -22 100"/><path d="M1250 664 l 8 90 l -16 140"/><path d="M1150 800 l 120 -20"/>
  </g>
  <g fill="#6E6B4A"><ellipse cx="1130" cy="860" rx="22" ry="8"/><ellipse cx="1300" cy="840" rx="18" ry="7"/></g>

  <!-- broken walkway -->
  <polygon points="760,680 820,680 850,820 730,820" fill="#8C8E88"/>
  <g stroke="#5C5E58" stroke-width="2"><path d="M790 690 l -8 120"/><path d="M740 760 l 100 6"/></g>

  <!-- house body, stained -->
  <rect x="540" y="380" width="520" height="280" fill="url(#wallO)" stroke="#6E6A5C" stroke-width="2"/>
  <g fill="#6F6B5C" opacity="0.55"><path d="M560 388 l -6 120 l 24 0 l 4 -120 z"/><path d="M1020 400 l 8 200 l 24 0 l -6 -200 z"/></g>
  <!-- peeling siding lines -->
  <g stroke="#76725F" stroke-width="2" opacity="0.6"><line x1="540" y1="440" x2="1060" y2="440"/><line x1="540" y1="500" x2="1060" y2="500"/><line x1="540" y1="560" x2="1060" y2="560"/></g>
  <!-- garage block -->
  <rect x="1060" y="470" width="240" height="190" fill="url(#wallO)" stroke="#6E6A5C" stroke-width="2"/>

  <!-- sagging damaged main roof -->
  <polygon points="500,400 800,300 1100,400" fill="url(#roofO)"/>
  <!-- sag dip -->
  <path d="M620 372 Q 800 330 980 372 L 980 392 Q 800 356 620 392 Z" fill="#1A1A18" opacity="0.7"/>
  <!-- missing shingle gaps -->
  <g fill="#5A4A38" opacity="0.9"><polygon points="660,360 700,348 706,366 668,378"/><polygon points="860,350 900,340 906,358 866,370"/><polygon points="760,378 792,370 798,388 766,396"/></g>
  <g stroke="#15150F" stroke-width="2" opacity="0.6"><line x1="560" y1="392" x2="820" y2="312"/><line x1="1040" y1="392" x2="820" y2="312"/></g>
  <!-- garage roof, damaged -->
  <polygon points="1040,470 1180,410 1320,470" fill="url(#roofO)"/>
  <polygon points="1120,452 1160,436 1166,452 1126,468" fill="#5A4A38"/>

  <!-- cracked chimney, no cap -->
  <rect x="600" y="250" width="52" height="120" fill="#7A4438"/>
  <rect x="592" y="244" width="68" height="16" fill="#5E342A"/>
  <path d="M626 244 l -10 50 l 12 30 l -8 46" stroke="#3A201A" stroke-width="3" fill="none"/>
  <polygon points="600,250 618,250 610,270 600,266" fill="#5E342A"/>

  <!-- boarded / broken upper windows -->
  <g>
    <rect x="600" y="420" width="64" height="80" fill="#3A4046"/>
    <g stroke="#7A6A4A" stroke-width="10"><line x1="596" y1="446" x2="668" y2="450"/><line x1="596" y1="476" x2="668" y2="472"/></g>
    <rect x="936" y="420" width="64" height="80" fill="#3A4046"/>
    <g stroke="#2A2E33" stroke-width="2"><line x1="936" y1="420" x2="1000" y2="500"/><line x1="1000" y1="420" x2="936" y2="500"/><line x1="968" y1="420" x2="968" y2="500"/></g>
  </g>
  <!-- boarded / broken lower windows -->
  <g>
    <rect x="600" y="540" width="64" height="86" fill="#3A4046"/>
    <g stroke="#2A2E33" stroke-width="2"><line x1="600" y1="540" x2="664" y2="626"/><line x1="664" y1="540" x2="600" y2="626"/></g>
    <rect x="936" y="540" width="64" height="86" fill="#3A4046"/>
    <g stroke="#7A6A4A" stroke-width="10"><line x1="932" y1="566" x2="1004" y2="570"/><line x1="932" y1="600" x2="1004" y2="596"/></g>
  </g>

  <!-- broken porch + warped door -->
  <rect x="700" y="498" width="180" height="14" fill="#8A8676" transform="rotate(-2 790 505)"/>
  <rect x="706" y="512" width="12" height="120" fill="#7E7A68"/><rect x="862" y="516" width="12" height="116" fill="#6E6A58" transform="rotate(4 868 574)"/>
  <rect x="716" y="640" width="150" height="12" fill="#6B6754" transform="rotate(-2 791 646)"/>
  <rect x="746" y="520" width="88" height="116" fill="#46473F"/>
  <path d="M790 520 l -6 116" stroke="#2C2D27" stroke-width="3"/>
  <circle cx="822" cy="582" r="4" fill="#74705E"/>

  <!-- dented garage door -->
  <rect x="1090" y="500" width="180" height="160" fill="#8C8A7E" stroke="#6E6C60" stroke-width="3"/>
  <g stroke="#6E6C60" stroke-width="3">
    <line x1="1090" y1="540" x2="1270" y2="544"/><line x1="1090" y1="582" x2="1270" y2="578"/><line x1="1090" y1="620" x2="1270" y2="624"/>
  </g>
  <path d="M1150 520 q 30 24 60 0 q 20 30 -10 40" stroke="#5A584D" stroke-width="3" fill="none"/>
  <polygon points="1200,600 1230,596 1226,624 1198,620" fill="#5A584D"/>

  <!-- leaking/rusted plumbing pipe -->
  <g stroke="#6E6256" stroke-width="8" fill="none" stroke-linecap="round">
    <path d="M540 540 v 70 l -14 22"/>
  </g>
  <circle cx="526" cy="632" r="9" fill="#574E42"/>
  <g fill="#5C666E" opacity="0.7"><ellipse cx="520" cy="664" rx="26" ry="8"/></g>

  <!-- dead trees / overgrowth -->
  <g>
    <rect x="250" y="610" width="14" height="60" fill="#4A3A28"/><g stroke="#4A3A28" stroke-width="4"><path d="M257 610 l -24 -28"/><path d="M257 622 l 26 -22"/></g>
    <rect x="430" y="620" width="12" height="50" fill="#4A3A28"/>
  </g>
  <g stroke="#6A6648" stroke-width="3"><path d="M330 690 l -4 -34"/><path d="M350 700 l 6 -30"/><path d="M310 704 l -2 -32"/><path d="M300 698 l 8 -28"/></g>

  <!-- leaning broken fence (gaps + tilt) -->
  <g fill="#8A8676" stroke="#6E6A58">
    <rect x="100" y="694" width="1400" height="10" opacity="0.8"/>
    <g>
      <rect x="120" y="676" width="14" height="74" transform="rotate(-6 127 713)"/><rect x="170" y="678" width="14" height="72" transform="rotate(4 177 714)"/>
      <rect x="220" y="680" width="14" height="70"/><rect x="320" y="676" width="14" height="74" transform="rotate(-9 327 713)"/>
      <rect x="370" y="682" width="14" height="68" transform="rotate(6 377 716)"/><rect x="470" y="678" width="14" height="72" transform="rotate(-4 477 714)"/>
      <rect x="520" y="684" width="14" height="66"/><rect x="620" y="676" width="14" height="74" transform="rotate(7 627 713)"/>
      <rect x="670" y="680" width="14" height="70" transform="rotate(-5 677 715)"/>
      <rect x="860" y="678" width="14" height="72" transform="rotate(8 867 714)"/><rect x="960" y="682" width="14" height="68" transform="rotate(-6 967 716)"/>
      <rect x="1060" y="676" width="14" height="74" transform="rotate(5 1067 713)"/><rect x="1160" y="684" width="14" height="66" transform="rotate(-8 1167 717)"/>
      <rect x="1330" y="678" width="14" height="72" transform="rotate(6 1337 714)"/><rect x="1430" y="682" width="14" height="68" transform="rotate(-5 1437 716)"/>
    </g>
  </g>
  <!-- broken hanging gate -->
  <g fill="#7E7A68" stroke="#5E5A4A" stroke-width="2">
    <rect x="730" y="668" width="48" height="86" transform="rotate(-12 754 711)"/>
    <rect x="788" y="672" width="48" height="82" transform="rotate(6 812 713)"/>
  </g>

  <!-- rain -->
  <g stroke="#C9D2DA" stroke-width="2" opacity="0.45">
    <line x1="120" y1="60" x2="96" y2="160"/><line x1="260" y1="20" x2="236" y2="120"/><line x1="420" y1="80" x2="396" y2="180"/>
    <line x1="560" y1="30" x2="536" y2="130"/><line x1="700" y1="70" x2="676" y2="170"/><line x1="840" y1="20" x2="816" y2="120"/>
    <line x1="980" y1="80" x2="956" y2="180"/><line x1="1120" y1="40" x2="1096" y2="140"/><line x1="1260" y1="70" x2="1236" y2="170"/>
    <line x1="1400" y1="30" x2="1376" y2="130"/><line x1="1520" y1="80" x2="1496" y2="180"/>
    <line x1="190" y1="240" x2="166" y2="340"/><line x1="480" y1="280" x2="456" y2="380"/><line x1="760" y1="240" x2="736" y2="340"/>
    <line x1="1040" y1="280" x2="1016" y2="380"/><line x1="1340" y1="240" x2="1316" y2="340"/>
    <line x1="340" y1="460" x2="316" y2="560"/><line x1="900" y1="470" x2="876" y2="570"/><line x1="1460" y1="460" x2="1436" y2="560"/>
  </g>
</svg>
