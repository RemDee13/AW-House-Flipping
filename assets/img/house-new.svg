<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-label="Renovated suburban house on a sunny day by a forest and lake">
  <defs>
    <linearGradient id="skyN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6FA9DD"/><stop offset="0.55" stop-color="#A9D0EE"/><stop offset="1" stop-color="#E4F1FB"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFF7DC"/><stop offset="0.5" stop-color="#FFE9A8"/><stop offset="1" stop-color="#FFE9A8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lawnN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7BB04E"/><stop offset="1" stop-color="#588A37"/>
    </linearGradient>
    <linearGradient id="lakeN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9CC9E8"/><stop offset="1" stop-color="#6FAAD2"/>
    </linearGradient>
    <linearGradient id="wallN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3F1E8"/><stop offset="1" stop-color="#E2E5D6"/>
    </linearGradient>
    <linearGradient id="roofN" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#454B52"/><stop offset="1" stop-color="#2E3338"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="1600" height="640" fill="url(#skyN)"/>
  <circle cx="1380" cy="150" r="150" fill="url(#sun)"/>
  <circle cx="1380" cy="150" r="58" fill="#FFF3C4"/>
  <!-- soft clouds -->
  <g fill="#FFFFFF" opacity="0.85">
    <ellipse cx="300" cy="140" rx="110" ry="34"/><ellipse cx="380" cy="120" rx="80" ry="30"/>
    <ellipse cx="980" cy="90" rx="90" ry="26"/><ellipse cx="1050" cy="100" rx="60" ry="22"/>
  </g>
  <!-- forest treeline -->
  <g fill="#3E6B3A">
    <polygon points="0,560 70,440 140,560"/><polygon points="110,560 190,420 270,560"/>
    <polygon points="240,560 320,450 400,560"/><polygon points="1180,560 1260,440 1340,560"/>
    <polygon points="1310,560 1390,430 1470,560"/><polygon points="1440,560 1520,450 1600,560"/>
  </g>
  <!-- lake -->
  <path d="M0 600 Q 400 560 820 600 L 1600 600 L 1600 660 L 0 660 Z" fill="url(#lakeN)"/>
  <g stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="3" fill="none">
    <path d="M120 624 q 40 -8 80 0"/><path d="M1300 632 q 50 -8 100 0"/>
  </g>
  <!-- lawn -->
  <rect y="630" width="1600" height="270" fill="url(#lawnN)"/>

  <!-- driveway (concrete) -->
  <polygon points="1120,660 1300,660 1360,900 1060,900" fill="#C9CBC6"/>
  <polygon points="1120,660 1300,660 1300,672 1120,672" fill="#B7BAB4"/>
  <g stroke="#A7AAA3" stroke-width="3"><line x1="1180" y1="672" x2="1140" y2="900"/><line x1="1240" y1="672" x2="1280" y2="900"/></g>

  <!-- walkway -->
  <polygon points="760,680 820,680 850,820 730,820" fill="#CFD1CC"/>

  <!-- house body -->
  <rect x="540" y="380" width="520" height="280" fill="url(#wallN)" stroke="#CDCFC0" stroke-width="2"/>
  <!-- garage block -->
  <rect x="1060" y="470" width="240" height="190" fill="url(#wallN)" stroke="#CDCFC0" stroke-width="2"/>
  <!-- main roof -->
  <polygon points="500,400 800,290 1100,400" fill="url(#roofN)"/>
  <polygon points="500,400 800,290 800,300 510,406" fill="#565C63"/>
  <g stroke="#3A4046" stroke-width="2" opacity="0.7">
    <line x1="540" y1="386" x2="800" y2="300"/><line x1="600" y1="364" x2="800" y2="312"/><line x1="1060" y1="386" x2="800" y2="300"/>
  </g>
  <!-- garage roof -->
  <polygon points="1040,470 1180,410 1320,470" fill="url(#roofN)"/>
  <!-- chimney -->
  <rect x="600" y="250" width="52" height="120" fill="#9B4A3A"/>
  <rect x="592" y="244" width="68" height="16" fill="#7E3A2D"/>
  <g stroke="#7E3A2D" stroke-width="2"><line x1="600" y1="280" x2="652" y2="280"/><line x1="600" y1="310" x2="652" y2="310"/><line x1="600" y1="340" x2="652" y2="340"/></g>
  <rect x="612" y="226" width="28" height="20" fill="#C9CCC9"/>

  <!-- upper windows -->
  <g>
    <rect x="600" y="420" width="64" height="80" fill="#A9CDE6" stroke="#FFFFFF" stroke-width="6"/>
    <rect x="936" y="420" width="64" height="80" fill="#A9CDE6" stroke="#FFFFFF" stroke-width="6"/>
    <rect x="588" y="416" width="14" height="88" fill="#2E3338"/><rect x="662" y="416" width="14" height="88" fill="#2E3338"/>
    <rect x="924" y="416" width="14" height="88" fill="#2E3338"/><rect x="998" y="416" width="14" height="88" fill="#2E3338"/>
  </g>
  <!-- lower windows -->
  <g>
    <rect x="600" y="540" width="64" height="86" fill="#A9CDE6" stroke="#FFFFFF" stroke-width="6"/>
    <rect x="936" y="540" width="64" height="86" fill="#A9CDE6" stroke="#FFFFFF" stroke-width="6"/>
    <rect x="588" y="536" width="14" height="94" fill="#2E3338"/><rect x="662" y="536" width="14" height="94" fill="#2E3338"/>
    <rect x="924" y="536" width="14" height="94" fill="#2E3338"/><rect x="998" y="536" width="14" height="94" fill="#2E3338"/>
  </g>

  <!-- porch roof + posts -->
  <rect x="700" y="498" width="180" height="14" fill="#EDEBE2" stroke="#CDCFC0"/>
  <rect x="706" y="512" width="12" height="120" fill="#FFFFFF"/><rect x="862" y="512" width="12" height="120" fill="#FFFFFF"/>
  <!-- steps -->
  <rect x="724" y="636" width="132" height="10" fill="#D8DAD2"/><rect x="712" y="646" width="156" height="12" fill="#CACCC3"/>
  <!-- front door -->
  <rect x="746" y="520" width="88" height="116" fill="#2F5D50"/>
  <rect x="754" y="528" width="32" height="48" fill="#3A7264"/><rect x="794" y="528" width="32" height="48" fill="#3A7264"/>
  <circle cx="822" cy="582" r="4" fill="#E8C16A"/>

  <!-- garage door -->
  <rect x="1090" y="500" width="180" height="160" fill="#EDEBE2" stroke="#CFD1C6" stroke-width="3"/>
  <g stroke="#D2D4C9" stroke-width="3">
    <line x1="1090" y1="540" x2="1270" y2="540"/><line x1="1090" y1="580" x2="1270" y2="580"/><line x1="1090" y1="620" x2="1270" y2="620"/>
    <line x1="1135" y1="500" x2="1135" y2="660"/><line x1="1180" y1="500" x2="1180" y2="660"/><line x1="1225" y1="500" x2="1225" y2="660"/>
  </g>

  <!-- exterior plumbing pipe (left side) -->
  <g stroke="#B9BBB2" stroke-width="8" fill="none" stroke-linecap="round">
    <path d="M540 540 v 92"/>
  </g>
  <circle cx="540" cy="612" r="9" fill="#9FA199"/>

  <!-- maple trees / beds -->
  <g>
    <rect x="250" y="610" width="14" height="60" fill="#6B4A2E"/><circle cx="257" cy="586" r="46" fill="#5C9A3E"/>
    <rect x="430" y="620" width="12" height="50" fill="#6B4A2E"/><circle cx="436" cy="600" r="36" fill="#69A84B"/>
  </g>
  <g fill="#E86A6A"><circle cx="320" cy="690" r="7"/><circle cx="345" cy="700" r="7"/><circle cx="300" cy="704" r="7"/></g>

  <!-- white picket fence -->
  <g fill="#F4F3EC" stroke="#D9DAD1">
    <rect x="100" y="690" width="1400" height="10"/>
    <!-- pickets, gap at gate 730-830 -->
    <g>
      <rect x="120" y="676" width="14" height="74"/><rect x="170" y="676" width="14" height="74"/><rect x="220" y="676" width="14" height="74"/>
      <rect x="270" y="676" width="14" height="74"/><rect x="320" y="676" width="14" height="74"/><rect x="370" y="676" width="14" height="74"/>
      <rect x="420" y="676" width="14" height="74"/><rect x="470" y="676" width="14" height="74"/><rect x="520" y="676" width="14" height="74"/>
      <rect x="570" y="676" width="14" height="74"/><rect x="620" y="676" width="14" height="74"/><rect x="670" y="676" width="14" height="74"/>
      <rect x="860" y="676" width="14" height="74"/><rect x="910" y="676" width="14" height="74"/><rect x="960" y="676" width="14" height="74"/>
      <rect x="1010" y="676" width="14" height="74"/><rect x="1060" y="676" width="14" height="74"/><rect x="1110" y="676" width="14" height="74"/>
      <rect x="1160" y="676" width="14" height="74"/><rect x="1330" y="676" width="14" height="74"/><rect x="1380" y="676" width="14" height="74"/>
      <rect x="1430" y="676" width="14" height="74"/><rect x="1480" y="676" width="14" height="74"/>
    </g>
  </g>
  <!-- gate -->
  <g fill="#FBFAF4" stroke="#CFD1C6" stroke-width="2">
    <rect x="730" y="668" width="48" height="86"/><rect x="788" y="668" width="48" height="86"/>
    <line x1="730" y1="700" x2="836" y2="700"/>
  </g>
</svg>
